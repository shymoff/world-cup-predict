services:
  - type: web
    name: world-cup-predict
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_JWT_SECRET
        generateValue: true
      - key: H2_CONSOLE_ENABLED
        value: "false"
      # Baza danych: Supabase Postgres (przez connection pooler - IPv4, dziala na Renderze).
      # DB_URL np.: jdbc:postgresql://aws-0-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require
      - key: DB_URL
        sync: false
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
